<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Strike: Arcade Space Shooter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud">
            <div id="score-container">Score: <span id="score">0</span></div>
            <div id="cheat-indicator"></div>
        </div>

        <div id="ui-overlay" class="visible">
            <div id="start-screen" class="ui-panel">
                <h1>STELLAR STRIKE</h1>
                <p>Move: Arrow Keys | Shoot: Spacebar</p>
                <button id="start-btn" class="glow-button">LAUNCH MISSION</button>
            </div>

            <div id="game-over-screen" class="ui-panel hidden">
                <h1>MISSION FAILED</h1>
                <p>Final Score: <span id="final-score">0</span></p>
                <button id="restart-btn" class="glow-button">RETRY MISSION</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
